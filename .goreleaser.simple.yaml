version: 2

project_name: chatgpt2api

builds:
  - id: chatgpt2api
    main: ./cmd/chatgpt2api
    binary: chatgpt2api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X chatgpt2api/internal/version.Version={{ .Version }}
      - -X chatgpt2api/internal/version.Commit={{ .Commit }}
      - -X chatgpt2api/internal/version.Date={{ .Date }}
      - -X chatgpt2api/internal/version.BuildType=release

archives: []

checksum:
  disable: true

changelog:
  disable: true

dockers:
  - id: ghcr-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/chatgpt2api:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/chatgpt2api:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPO_OWNER_LOWER }}/chatgpt2api:latest"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - web_dist
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPO_OWNER }}/{{ .Env.GITHUB_REPO_NAME }}"

docker_manifests: []

release:
  draft: false
  prerelease: auto
  name_template: "chatgpt2api {{ .Version }} (Simple)"
  skip_upload: true
  header: |
    {{ .Env.TAG_MESSAGE }}
  footer: |

    ---

    Simple release only publishes the linux/amd64 GHCR Docker image.
